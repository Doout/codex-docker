apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-docker
  namespace: codex-docker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: codex-docker
  template:
    metadata:
      labels:
        app: codex-docker
    spec:
      containers:
        - name: workspace
          image: doout/codex-docker:latest
          imagePullPolicy: IfNotPresent
          command:
            - sleep
            - infinity
          workingDir: /workspace
          stdin: true
          tty: true
          ports:
            - name: ssh
              containerPort: 22
              protocol: TCP
          env:
            - name: CODEX_HOME
              value: /root/.codex
            - name: INSTALL_WORKSPACE_APT
              value: "1"
            - name: SSH_AUTHORIZED_KEYS
              valueFrom:
                secretKeyRef:
                  name: codex-ssh-authorized-keys
                  key: authorized_keys
                  optional: true
            - name: START_SSHD
              value: "1"
            - name: TERM
              value: xterm-256color
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: workspace-data
              mountPath: /workspace
            - name: codex-home
              mountPath: /root/.codex
            - name: cache-data
              mountPath: /root/.cache
      volumes:
        - name: workspace-data
          persistentVolumeClaim:
            claimName: codex-workspace
        - name: codex-home
          persistentVolumeClaim:
            claimName: codex-home
        - name: cache-data
          persistentVolumeClaim:
            claimName: codex-cache
